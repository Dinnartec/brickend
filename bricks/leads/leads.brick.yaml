brick:
  name: leads
  version: "1.0.0"
  description: "Lead management for real estate agents"

requires:
  - { brick: auth, version: ">=1.0.0" }

config: {}

schema:
  table: leads
  primary_key: lead_id
  fields:
    - { name: lead_id, type: uuid, default: "gen_random_uuid()" }
    - { name: owner_id, type: uuid, references: auth }
    - { name: name, type: string, required: true }
    - { name: email, type: email, nullable: true }
    - { name: phone, type: string, nullable: true }
    - { name: interest, type: text, nullable: true }
    - { name: status, type: string, required: true }
    - { name: source, type: string, nullable: true }
  indexes:
    - { name: leads_name_gin_idx, columns: [name], type: gin, expression: "to_tsvector('simple', name)" }

access:
  - { role: admin, actions: [list, get, create, update, softDelete] }
  - { role: agent, actions: [list, get, create, update, softDelete], own_only: true }
  - { role: buyer, actions: [list, get], own_only: true }

api:
  auth_required: true
  search_field: name
  endpoints:
    - { method: GET, path: /, handler: list, has_pagination: true }
    - { method: GET, path: /:id, handler: get }
    - { method: POST, path: /, handler: create, status: 201 }
    - { method: PATCH, path: /:id, handler: update }
    - { method: DELETE, path: /:id, handler: softDelete, status: 204 }
