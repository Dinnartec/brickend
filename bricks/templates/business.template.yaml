template:
  name: business
  version: "1.0.0"
  description: "Business management with entities and catalog"

settings:
  multi_tenant: false

roles:
  - name: admin
    description: "Full access to all resources"
    is_default: true
  - name: member
    description: "Can manage entities and catalog"
  - name: viewer
    description: "Read-only access"

baseline:
  - { brick: identification_types, version: ">=1.0.0" }
  - { brick: auth, version: ">=1.0.0" }
  - { brick: users, version: ">=1.0.0" }
  - { brick: entities, version: ">=1.0.0" }
  - { brick: catalog, version: ">=1.0.0" }

bricks: []
