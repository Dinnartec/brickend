template:
  name: crm
  version: "1.0.0"
  description: "Simple CRM with contacts, deals, and entity management"

settings:
  multi_tenant: false

roles:
  - name: admin
    description: "Full access to all CRM data"
    is_default: true
  - name: salesman
    description: "Manage own contacts and deals"
  - name: viewer
    description: "Read-only access"

baseline:
  - { brick: identification_types, version: ">=1.0.0" }
  - { brick: auth, version: ">=1.0.0" }
  - { brick: users, version: ">=1.0.0" }
  - { brick: entities, version: ">=1.0.0" }
  - { brick: contacts, version: ">=1.0.0" }
  - { brick: deals, version: ">=1.0.0" }

bricks: []
