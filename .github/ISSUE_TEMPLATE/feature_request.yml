name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should it work? Include examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What other approaches did you consider?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI command
        - Brick spec
        - Code generation
        - MCP server
        - Templates
        - Documentation
        - Other
    validations:
      required: true
